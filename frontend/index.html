document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

splay-small-line:    40px;\n  --font-display-small-weight:  var(--font-weight-bold);\n\n  /* Heading */\n  --font-heading-large-size:    24px;\n  --font-heading-large-line:    32px;\n  --font-heading-large-weight:  var(--font-weight-bold);\n\n  --font-heading-medium-size:   20px;\n  --font-heading-medium-line:   28px;\n  --font-heading-medium-weight: var(--font-weight-bold);\n\n  --font-heading-small-size:    18px;\n  --font-heading-small-line:    26px;\n  --font-heading-small-weight:  var(--font-weight-bold);\n\n  /* Body */\n  --font-body-large-size:    16px;\n  --font-body-large-line:    24px;\n  --font-body-large-weight:  var(--font-weight-medium);\n\n  --font-body-medium-size:   14px;\n  --font-body-medium-line:   20px;\n  --font-body-medium-weight: var(--font-weight-medium);\n\n  --font-body-small-size:    12px;\n  --font-body-small-line:    16px;\n  --font-body-small-weight:  var(--font-weight-medium);\n\n  /* Label */\n  --font-label-medium-size:   10px;\n  --font-label-medium-line:   12px;\n  --font-label-medium-weight: var(--font-weight-medium);\n\n  --font-label-small-size:    8px;\n  --font-label-small-line:    10px;\n  --font-label-small-weight:  var(--font-weight-medium);\n}\n\n/* \u2500\u2500 Utility Text Classes \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n.text-display-large  { font-family: var(--font-sans); font-size: var(--font-display-large-size);  line-height: var(--font-display-large-line);  font-weight: var(--font-display-large-weight);  letter-spacing: var(--tracking-display); }\n.text-display-medium { font-family: var(--font-sans); font-size: var(--font-display-medium-size); line-height: var(--font-display-medium-line); font-weight: var(--font-display-medium-weight); letter-spacing: var(--tracking-display); }\n.text-display-small  { font-family: var(--font-sans); font-size: var(--font-display-small-size);  line-height: var(--font-display-small-line);  font-weight: var(--font-display-small-weight);  letter-spacing: var(--tracking-display); }\n\n.text-heading-large  { font-family: var(--font-sans); font-size: var(--font-heading-large-size);  line-height: var(--font-heading-large-line);  font-weight: var(--font-heading-large-weight);  letter-spacing: var(--tracking-heading); }\n.text-heading-medium { font-family: var(--font-sans); font-size: var(--font-heading-medium-size); line-height: var(--font-heading-medium-line); font-weight: var(--font-heading-medium-weight); letter-spacing: var(--tracking-heading); }\n.text-heading-small  { font-family: var(--font-sans); font-size: var(--font-heading-small-size);  line-height: var(--font-heading-small-line);  font-weight: var(--font-heading-small-weight);  letter-spacing: var(--tracking-heading); }\n\n.text-body-large     { font-family: var(--font-sans); font-size: var(--font-body-large-size);     line-height: var(--font-body-large-line);     font-weight: var(--font-body-large-weight);     letter-spacing: var(--tracking-body); }\n.text-body-large-bold{ font-family: var(--font-sans); font-size: var(--font-body-large-size);     line-height: var(--font-body-large-line);     font-weight: var(--font-weight-bold);           letter-spacing: var(--tracking-body); }\n.text-body-medium    { font-family: var(--font-sans); font-size: var(--font-body-medium-size);    line-height: var(--font-body-medium-line);    font-weight: var(--font-body-medium-weight);    letter-spacing: var(--tracking-body); }\n.text-body-medium-bold{ font-family: var(--font-sans); font-size: var(--font-body-medium-size);   line-height: var(--font-body-medium-line);    font-weight: var(--font-weight-bold);           letter-spacing: var(--tracking-body); }\n.text-body-small     { font-family: var(--font-sans); font-size: var(--font-body-small-size);     line-height: var(--font-body-small-line);     font-weight: var(--font-body-small-weight);     letter-spacing: var(--tracking-body); }\n.text-body-small-bold{ font-family: var(--font-sans); font-size: var(--font-body-small-size);     line-height: var(--font-body-small-line);     font-weight: var(--font-weight-bold);           letter-spacing: var(--tracking-body); }\n\n.text-label-medium   { font-family: var(--font-sans); font-size: var(--font-label-medium-size);   line-height: var(--font-label-medium-line);   font-weight: var(--font-label-medium-weight);   letter-spacing: var(--tracking-label); }\n.text-label-small    { font-family: var(--font-sans); font-size: var(--font-label-small-size);    line-height: var(--font-label-small-line);    font-weight: var(--font-label-small-weight);    letter-spacing: var(--tracking-label); }\n\n.text-mono           { font-family: var(--font-mono); }\n.text-script         { font-family: var(--font-script); }\n<\u002Fstyle>\n  <style>/* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   Crest Design System \u2014 Yocket\n   Spacing + Radius + Elevation Tokens\n   Base unit: 4px\n   \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n\n:root {\n  /* \u2500\u2500 Spacing Scale (core) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --space-050:  2px;\n  --space-100:  4px;\n  --space-200:  8px;\n  --space-250:  10px;\n  --space-300:  12px;\n  --space-400:  16px;\n  --space-500:  20px;\n  --space-600:  24px;\n  --space-800:  32px;\n  --space-900:  36px;\n  --space-1000: 40px;\n  --space-1200: 48px;\n  --space-1600: 64px; /* @kind spacing */\n  --space-2000: 80px;\n  --space-2400: 96px;\n\n  /* \u2500\u2500 Semantic Spacing Aliases \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --space-xs:  var(--space-200);   /* 8px */\n  --space-sm:  var(--space-300);   /* 12px */\n  --space-md:  var(--space-400);   /* 16px */\n  --space-lg:  var(--space-600);   /* 24px */\n  --space-xl:  var(--space-800);   /* 32px */\n  --space-2xl: var(--space-1200);  /* 48px */\n  --space-3xl: var(--space-2000);  /* 80px */\n\n  /* \u2500\u2500 Radius Scale \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --radius-xsmall:  2px;\n  --radius-small:   4px;\n  --radius-medium:  6px;\n  --radius-large:   8px;\n  --radius-xlarge:  12px;\n  --radius-xxlarge: 16px;\n  --radius-full:    1000px;\n\n  /* \u2500\u2500 Semantic Radius Aliases \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --radius-button:  var(--radius-large);    /* 8px */\n  --radius-input:   var(--radius-large);    /* 8px */\n  --radius-card:    var(--radius-xlarge);   /* 12px */\n  --radius-modal:   var(--radius-xxlarge);  /* 16px */\n  --radius-badge:   var(--radius-full);     /* pill */\n  --radius-tag:     var(--radius-small);    /* 4px */\n  --radius-chip:    var(--radius-full);     /* pill */\n\n  /* \u2500\u2500 Elevation Scale \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --elevation-none: none;\n  --elevation-xs:   0px 1px 2px 0px rgba(55, 65, 81, 0.08);\n  --elevation-sm:   0px 2px 4px 0px rgba(55, 65, 81, 0.10);\n  --elevation-md:   0px 4px 8px 0px rgba(55, 65, 81, 0.12);\n  --elevation-lg:   0px 8px 16px 0px rgba(55, 65, 81, 0.12);\n  --elevation-xl:   0px 16px 32px 0px rgba(55, 65, 81, 0.16);\n  --elevation-2xl:  0px 24px 48px 0px rgba(55, 65, 81, 0.20 "><\u002Fpolyline><\u002Fsvg>\n      <span>100K+ students guided to the right university<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n      <\u002Fdiv><!-- /screens-wrap -->\n    <\u002Fdiv><!-- /phone-screen-wrap -->\n    <div class=\"phone-home\"><\u002Fdiv>\n  <\u002Fdiv><!-- /phone-bezel -->\n<\u002Fdiv><!-- /phone-outer -->\n<\u002Fdiv><!-- /app-shell -->\n\n<!-- Dev nav -->\n<div style=\"position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;gap:4px;padding:8px 10px;background:rgba(43,51,64,0.95);backdrop-filter:blur(8px);border-radius:100px;\">\n  <button data-goto=\"0\" style=\"border:none;background:rgba(255,255,255,0.1);color:#fff;border-radius:100px;padding:5px 10px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;\">\u2460 Blog<\u002Fbutton>\n  <button data-goto=\"1\" style=\"border:none;background:rgba(255,255,255,0.1);color:#fff;border-radius:100px;padding:5px 10px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;\">\u2461 Profile<\u002Fbutton>\n  <button data-goto=\"2\" style=\"border:none;background:rgba(255,255,255,0.1);color:#fff;border-radius:100px;padding:5px 10px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;\">\u2462 Results<\u002Fbutton>\n  <button data-goto=\"3\" style=\"border:none;background:rgba(255,255,255,0.1);color:#fff;border-radius:100px;padding:5px 10px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;\">\u2463 OTP<\u002Fbutton>\n  <button data-goto=\"4\" style=\"border:none;background:rgba(255,255,255,0.1);color:#fff;border-radius:100px;padding:5px 10px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;\">\u2464 Full<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  goTo(n) {\n    var self = this;\n    var screens = Array.from(document.querySelectorAll('.screen'));\n    var current = -1;\n    screens.forEach(function(s, i) { if (s.classList.contains('active')) current = i; });\n    if (current === n) return;\n    if (self._sheetTimer) { clearTimeout(self._sheetTimer); self._sheetTimer = null; }\n\n    var goingForward = n > current;\n    var incoming = screens[n];\n    var outgoing = current >= 0 ? screens[current] : null;\n\n    screens.forEach(function(s, i) {\n      if (i !== current && i !== n) {\n        s.style.transition = 'none';\n        s.style.transform = 'translateX(100%)';\n        s.classList.remove('active');\n      }\n    });\n\n    incoming.style.transition = 'none';\n    incoming.style.transform = goingForward ? 'translateX(100%)' : 'translateX(-30%)';\n    incoming.classList.add('active');\n    void incoming.offsetWidth;\n    incoming.style.transition = 'transform 0.32s cubic-bezier(0.2,0,0,1)';\n    incoming.style.transform = 'translateX(0)';\n\n    if (outgoing) {\n      outgoing.style.transition = 'transform 0.32s cubic-bezier(0.2,0,0,1)';\n      outgoing.style.transform = goingForward ? 'translateX(-30%)' : 'translateX(100%)';\n      setTimeout(function() { outgoing.classList.remove('active'); outgoing.style.transform = ''; outgoing.style.transition = ''; }, 340);\n    }\n\n    setTimeout(function() {\n      incoming.style.transform = '';\n      incoming.style.transition = '';\n      incoming.scrollTop = 0;\n      if (n === 2) {\n        self._sheetTimer = setTimeout(function() { self.showGateSheet(); }, 2500);\n      }\n    }, 340);\n  }\n\n  showGateSheet() {\n    var sheet = document.getElementById('gate-sheet');\n    var backdrop = document.getElementById('sheet-backdrop');\n    if (sheet) sheet.classList.add('show');\n    if (backdrop) backdrop.classList.add('show');\n  }\n  hideGateSheet() {\n    var sheet = document.getElementById('gate-sheet');\n    var backdrop = document.getElementById('sheet-backdrop');\n    if (sheet) sheet.classList.remove('show');\n    if (backdrop) backdrop.classList.remove('show');\n    var nudge = document.getElementById('unlock-nudge');\n    if (nudge) nudge.style.display = 'flex';\n  }\n\n  showBooking() {\n    var sheet = document.getElementById('booking-sheet');\n    var backdrop = document.getElementById('booking-backdrop');\n    if (sheet) sheet.classList.add('show');\n    if (backdrop) backdrop.classList.add('show');\n  }\n  hideBooking() {\n    var sheet = document.getElementById('booking-sheet');\n    var backdrop = document.getElementById('booking-backdrop');\n    if (sheet) sheet.classList.remove('show');\n    if (backdrop) backdrop.classList.remove('show');\n  }\n\n  showCtryFilter() {\n    var sheet = document.getElementById('ctry-filter-sheet');\n    var backdrop = document.getElementById('ctry-filter-backdrop');\n    if (sheet) sheet.classList.add('show');\n    if (backdrop) backdrop.classList.add('show');\n  }\n  hideCtryFilter() {\n    var sheet = document.getElementById('ctry-filter-sheet');\n    var backdrop = document.getElementById('ctry-filter-backdrop');\n    if (sheet) sheet.classList.remove('show');\n    if (backdrop) backdrop.classList.remove('show');\n  }\n\n  scalePhone() {\n    var outer = document.querySelector('.phone-outer');\n    if (!outer) return;\n    var bezel = outer.querySelector('.phone-bezel');\n    if (!bezel) return;\n    var availH = window.innerHeight - 32;\n    var availW = window.innerWidth - 32;\n    var frameH = bezel.offsetHeight || 920;\n    var frameW = bezel.offsetWidth || 418;\n    var scale = Math.min(1, availH / frameH, availW / frameW);\n    outer.style.transform = 'scale(' + scale + ')';\n  }\n\n  componentDidMount() {\n    var self = this;\n    this.scalePhone();\n    window.addEventListener('resize', function() { self.scalePhone(); });\n\n    document.addEventListener('click', function(e) {\n      // Navigation\n      var navEl = e.target.closest('[data-goto]');\n      if (navEl && !navEl.closest('.gate-sheet')) {\n        self.goTo(parseInt(navEl.getAttribute('data-goto'), 10));\n        return;\n      }\n      if (navEl && navEl.closest('.gate-sheet')) {\n        self.hideGateSheet();\n        self.goTo(parseInt(navEl.getAttribute('data-goto'), 10));\n        return;\n      }\n\n      // Gate sheet controls\n      if (e.target.closest('#sheet-close')) { self.hideGateSheet(); return; }\n      if (e.target.id === 'sheet-backdrop') { self.hideGateSheet(); return; }\n      if (e.target.closest('#nudge-show-sheet')) { self.showGateSheet(); return; }\n\n      // Booking modal\n      if (e.target.closest('[data-open-booking]')) { self.showBooking(); return; }\n      if (e.target.closest('#booking-close')) { self.hideBooking(); return; }\n      if (e.target.id === 'booking-backdrop') { self.hideBooking(); return; }\n\n      // Country filter\n      if (e.target.closest('#ctry-filter-btn')) { self.showCtryFilter(); return; }\n      if (e.target.id === 'ctry-filter-backdrop') { self.hideCtryFilter(); return; }\n      if (e.target.closest('#ctry-apply-btn')) { self.hideCtryFilter(); return; }\n\n      // Country filter chips (multi-select)\n      var ctryChip = e.target.closest('.ctry-sel-chip');\n      if (ctryChip) { ctryChip.classList.toggle('sel'); return; }\n\n      // Tab switching\n      var tabEl = e.target.closest('.tab-item');\n      if (tabEl) {\n        var tabId = tabEl.getAttribute('data-tab');\n        document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });\n        document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });\n        tabEl.classList.add('active');\n        var content = document.getElementById('tab-' + tabId);\n        if (content) content.classList.add('active');\n        return;\n      }\n\n      // Widget chip picks\n      var wchip = e.target.closest('.w-chip[data-group]');\n      if (wchip) {\n        var g = document.getElementById(wchip.getAttribute('data-group'));\n        if (g) g.querySelectorAll('.w-chip').forEach(function(c) { c.classList.remove('sel'); });\n        wchip.classList.add('sel');\n        return;\n      }\n      var wctry = e.target.closest('.w-ctry-chip[data-group]');\n      if (wctry) {\n        var g2 = document.getElementById(wctry.getAttribute('data-group'));\n        if (g2) g2.querySelectorAll('.w-ctry-chip').forEach(function(c) { c.classList.remove('sel'); });\n        wctry.classList.add('sel');\n        return;\n      }\n\n      // UG college suggestion chips\n      var ugChip = e.target.closest('.course-chip[data-college]');\n      if (ugChip) {\n        document.querySelectorAll('.course-chip[data-college]').forEach(function(c) { c.classList.remove('sel'); });\n        ugChip.classList.add('sel');\n        var inp = document.getElementById('ug-college-inp');\n        if (inp) { inp.value = ugChip.getAttribute('data-college'); }\n        var clr = document.getElementById('ug-college-clear');\n        if (clr) clr.classList.add('show');\n        return;\n      }\n      if (e.target.closest('#ug-college-clear')) {\n        var inp2 = document.getElementById('ug-college-inp');\n        if (inp2) inp2.value = '';\n        document.querySelectorAll('.course-chip[data-college]').forEach(function(c) { c.classList.remove('sel'); });\n        var clr2 = document.getElementById('ug-college-clear');\n        if (clr2) clr2.classList.remove('show');\n        return;\n      }\n\n      // Test chips\n      var testChip = e.target.closest('.chip[data-test-group]');\n      if (testChip) {\n        var tg = document.getElementById(testChip.getAttribute('data-test-group'));\n        if (tg) tg.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('sel'); });\n        testChip.classList.add('sel');\n        var revealId = testChip.getAttribute('data-reveal');\n        var label = testChip.getAttribute('data-label');\n        var maxHint = testChip.getAttribute('data-max');\n        var reveal = document.getElementById(revealId);\n        var scoreLabel = document.getElementById(revealId + '-label');\n        var scoreInp = document.getElementById(revealId + '-inp');\n        if (label === 'None') {\n          if (reveal) reveal.style.display = 'none';\n        } else {\n          if (reveal) { reveal.style.display = 'block'; reveal.classList.add('open'); }\n          if (scoreLabel) scoreLabel.textContent = 'Overall score (out of ' + maxHint + ')';\n          if (scoreInp) {\n            var hints = { IELTS: 'e.g. 7.5', GRE: 'e.g. 318', GMAT: 'e.g. 650', TOEFL: 'e.g. 105', PTE: 'e.g. 65' };\n            scoreInp.placeholder = hints[label] || 'Enter score';\n          }\n        }\n        return;\n      }\n    });\n\n    // Widget course search\n    var wcs = document.getElementById('w-course-search');\n    if (wcs) {\n      wcs.addEventListener('input', function() {\n        var q = this.value.toLowerCase().trim();\n        document.querySelectorAll('#w-course .w-chip').forEach(function(c) {\n          c.style.display = (!q || c.textContent.toLowerCase().includes(q)) ? '' : 'none';\n        });\n        var clr = document.getElementById('w-search-clear');\n        if (clr) clr.classList.toggle('show', this.value.length > 0);\n      });\n    }\n    var wclr = document.getElementById('w-search-clear');\n    if (wclr) {\n      wclr.addEventListener('click', function() {\n        var inp = document.getElementById('w-course-search');\n        if (inp) inp.value = '';\n        document.querySelectorAll('#w-course .w-chip').forEach(function(c) { c.style.display = ''; });\n        wclr.classList.remove('show');\n      });\n    }\n\n    // UG college search\n    var ugInp = document.getElementById('ug-college-inp');\n    if (ugInp) {\n      ugInp.addEventListener('input', function() {\n        var clr = document.getElementById('ug-college-clear');\n        if (clr) clr.classList.toggle('show', this.value.length > 0);\n      });\n    }\n  }\n}\n<\u002Fscript>\n\n\n\n<script>\n(function() {\n  function selChip(g) {\n    var el = document.querySelector('[data-group=\"'+g+'\"].sel');\n    if (!e y, Boston\":\"NEU\",\"Northeastern University, Silicon Valley\":\"NEU-SV\",\"Boston University\":\"BU\",\"Purdue University West Lafayette\":\"Purdue\",\"Pennsylvania State University\":\"PSU\",\"Texas A&M University, College Station\":\"TAMU\",\"Arizona State University\":\"ASU\",\"University at Buffalo SUNY\":\"UB\",\"Stony Brook University\":\"SBU\",\"Stevens Institute of Technology\":\"SIT\",\"Illinois Institute of Technology\":\"IIT\",\"North Carolina State University, Raleigh\":\"NCSU\",\"Virginia Tech\":\"VT\",\"Duke University\":\"Duke\",\"Johns Hopkins University\":\"JHU\",\"Northwestern University\":\"NU\",\"Cornell University\":\"Cornell\",\"Stanford University\":\"Stanford\",\"Harvard University\":\"Harvard\",\"The University of Chicago\":\"UChicago\",\"University of Chicago\":\"UChicago\",\"Vanderbilt University\":\"Vandy\",\"Indiana University Bloomington\":\"IU\",\"George Mason University\":\"GMU\",\"The George Washington University\":\"GWU\",\"Rutgers University, New Brunswick\":\"RU\",\"San Jose State University\":\"SJSU\",\"New Jersey Institute of Technology\":\"NJIT\",\"Rochester Institute of Technology\":\"RIT\",\"University of Arizona\":\"UA\",\"University of Maryland, Baltimore County\":\"UMBC\",\"California State University, Long Beach\":\"CSULB\",\"University of Pittsburgh\":\"Pitt\",\"Pace University\":\"Pace\",\"University of Cincinnati\":\"UC\",\"University College London\":\"UCL\",\"Imperial College London\":\"ICL\",\"The University of Edinburgh\":\"UoE\",\"University of Edinburgh\":\"UoE\",\"King's College London\":\"KCL\",\"University of Manchester\":\"UoM\",\"University of Birmingham\":\"UoB\",\"University of Bristol\":\"UoB\",\"University of Warwick\":\"UoW\",\"University of Glasgow\":\"UoG\",\"University of Liverpool\":\"UoL\",\"Queen Mary University of London\":\"QMUL\",\"University of Nottingham\":\"UoN\",\"University of Leeds\":\"Leeds\",\"Technical University of Munich\":\"TUM\",\"RWTH Aachen University\":\"RWTH\",\"Dresden University of Technology\":\"TU Dresden\",\"Delft University of Technology\":\"TU Delft\",\"University of Toronto\":\"UoT\",\"The University of British Columbia, Vancouver\":\"UBC\",\"McGill University\":\"McGill\"};\n  function abbr(n) {\n    if (ABBR[n]) return ABBR[n];\n    var skip=['of','the','at','in','and','for','university','college','institute','school','state','new'];\n    var w=n.replace(/,/g,'').split(' ').filter(function(x){return skip.indexOf(x.toLowerCase())<0;});\n    if(!w.length) w=n.split(' ');\n    return w.slice(0,4).map(function(x){return x[0].toUpperCase();}).join('').slice(0,5);\n  }\n\n  var CHK='<svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-green-700)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>';\n  var LCK='<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--text-secondary)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\" ry=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>';\n\n  function openCard(c,idx,total) {\n    var s=c.scholarship_pct>0?'<div class=\"stat-pill\">Scholarship <strong>'+c.scholarship_pct+'%<\u002Fstrong><\u002Fdiv>':'';\n    return '<div class=\"offer-card highlight\"><div class=\"card-rank\"><span>OFFER '+(idx+1)+' OF '+total+'<\u002Fspan><span class=\"unlock-badge\">'+CHK+' Unlocked<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;\"><div class=\"card-logo\">'+c.abbr+'<\u002Fdiv><div><div class=\"card-uni\">'+c.university+'<\u002Fdiv><div class=\"card-prog\">'+c.course+'<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"card-stats\"><div class=\"stat-pill\">'+(c.rank_label||'Ranked')+'<\u002Fdiv><div class=\"stat-pill\"><strong>'+c.admit_count+'<\u002Fstrong> real admits<\u002Fdiv>'+s+'<\u002Fdiv><div class=\"card-actions\"><a href=\"'+(c.profile_url||'#')+'\" target=\"_blank\" class=\"btn-outline\">View admits<\u002Fa><button class=\"btn-book\" data-open-booking=\"true\">Book free 1:1<\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n  }\n  function lockedCard(c,idx,total) {\n    return '<div class=\"locked-card\"><div class=\"locked-inner\"><div class=\"card-rank\">OFFER '+(idx+1)+' OF '+total+'<\u002Fdiv><div class=\"card-uni\">'+c.university+'<\u002Fdiv><div class=\"card-prog\">'+c.course+'<\u002Fdiv><div class=\"card-stats\" style=\"margin-top:8px;\"><div class=\"stat-pill\">'+(c.rank_label||'Ranked')+'<\u002Fdiv><div class=\"stat-pill\">'+c.admit_count+' admits<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"lock-veil\"><div class=\"lock-ring\">'+LCK+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }\n  function fullCard(c,idx) {\n    var s=c.scholarship_pct>0?'<div class=\"stat-pill\">Scholarship <strong>'+c.scholarship_pct+'%<\u002Fstrong><\u002Fdiv>':'';\n    return '<div class=\"'+(idx===0?'offer-card highlight':'offer-card')+'\"><div class=\"card-rank\"><span>OFFER '+(idx+1)+'<\u002Fspan><span class=\"unlock-badge\">'+CHK+' Unlocked<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;\"><div class=\"card-logo\">'+c.abbr+'<\u002Fdiv><div><div class=\"card-uni\">'+c.university+'<\u002Fdiv><div class=\"card-prog\">'+c.course+'<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"card-stats\"><div class=\"stat-pill\">'+(c.rank_label||'Ranked')+'<\u002Fdiv><div class=\"stat-pill\"><strong>'+c.admit_count+'<\u002Fstrong> real admits<\u002Fdiv>'+s+'<\u002Fdiv><div class=\"card-actions\"><a href=\"'+(c.profile_url||'#')+'\" target=\"_blank\" class=\"btn-outline\">View admits<\u002Fa><button class=\"btn-book\" data-open-booking=\"true\">Book free 1:1<\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n  }\n  function nmCard(nm) {\n    return '<div class=\"offer-card near-miss\"><div class=\"card-rank\"><span>NEAR MISS<\u002Fspan><span class=\"nm-badge-inline\">\u26a1 Almost there<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;\"><div class=\"card-logo\" style=\"background:#FEF3C7;color:#D97706;\">'+abbr(nm.university)+'<\u002Fdiv><div><div class=\"card-uni\">'+nm.university+'<\u002Fdiv><div class=\"card-prog\">'+nm.course+'<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"margin-top:6px;font-size:12px;color:var(--text-secondary);background:rgba(0,0,0,.04);border-radius:6px;padding:7px 10px;\">'+nm.gap_label+'<\u002Fdiv><div class=\"card-actions\" style=\"margin-top:10px;\"><button class=\"btn-book\" data-open-booking=\"true\">Book free 1:1<\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n  }\n\n  function renderS2(data) {\n    var cards=data.results||[],total=cards.length,more=total>1?total-1:0;\n    var pill=document.getElementById('op-pill-span');\n    if(pill) pill.textContent=data.matched_profiles+' real profiles matched your profile';\n    var meta=document.getElementById('op-results-meta');\n    if(meta) meta.textContent=data.context_label;\n    var list=document.getElementById('op-results-list');\n    if(!list) return;\n    var h=openCard(cards[0],0,total);\n    for(var i=1;i<cards.length;i++) h+=lockedCard(cards[i],i,total);\n    list.innerHTML=h;\n    var nd=document.querySelector('#unlock-nudge .nudge-text');\n    if(nd) nd.textContent=more+' more offers waiting';\n  }\n\n  function renderS4(data) {\n    var cards=data.results||[],nm=data.near_miss||[];\n    var wb=document.getElementById('op-welcome-bar');\n    if(wb) wb.innerHTML=CHK+' All '+cards.length+' offers unlocked \u2014 '+data.matched_profiles+' profiles matched';\n    var s4m=document.getElementById('op-s4-meta');\n    if(s4m) s4m.textContent=data.context_label;\n    var mainEl=document.getElementById('op-main-cards');\n    if(mainEl){var h='';cards.forEach(function(c,i){h+=fullCard(c,i);});mainEl.innerHTML=h;}\n    var nmEl=document.getElementById('op-nm-cards');\n    if(nmEl){\n      if(!nm.length){nmEl.innerHTML='<div style=\"font-size:13px;color:var(--text-secondary);padding:4px 0;\">No near-miss universities found.<\u002Fdiv>';}\n      else{var nh='';nm.forEach(function(n){nh+=nmCard(n);});nmEl.innerHTML=nh;}\n    }\n  }\n\n  function setLoading(on) {\n    var btn=document.querySelector('[data-goto=\"2\"].cta-btn');\n    if(!btn) return;\n    btn.textContent=on?'Finding offers\u2026':'Find my offers';\n    btn.disabled=on; btn.style.opacity=on?'0.65':'1';\n  }\n  function rmErr(){var e=document.getElementById('op-error');if(e)e.parentNode.removeChild(e);}\n  function showErr(msg){\n    rmErr();\n    var d=document.createElement('div');d.id='op-error';\n    d.style.cssText='margin:10px 20px 0;padding:10px 14px;background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;font-size:13px;color:#DC2626;';\n    d.textContent=msg;\n    var s=document.getElementById('s1');if(s) s.appendChild(d);\n  }\n\n  document.addEventListener('click', function(e) {\n    var btn=e.target.closest('[data-goto=\"2\"].cta-btn');\n    if(!btn) return;\n    e.stopImmediatePropagation(); rmErr();\n    var p=collectForm();\n    if(!p.country||p.country==='undefined'){showErr('Please select a target country.');return;}\n    if(!p.parent_course||p.parent_course==='undefined'){showErr('Please select a target course.');return;}\n    setLoading(true);\n    fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})\n      .then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.detail||'Something went wrong.');});return r.json();})\n      .then(function(data){\n        setLoading(false); renderS2(data); renderS4(data);\n        if(window.__offerPredictor){window.__offerPredictor.goTo(2);}\n        else{document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});var s2=document.getElementById('s2');if(s2)s2.classList.add('active');}\n      })\n      .catch(function(err){setLoading(false);showErr(err.message);});\n  }, true);\n\n  var _iv=setInterval(function(){\n    if(typeof Component!=='undefined'){\n      clearInterval(_iv);\n      var o=Component.prototype.componentDidMount;\n      Component.prototype.componentDidMount=function(){window.__offerPredictor=this;o.call(this);};\n    }\n  },30);\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
